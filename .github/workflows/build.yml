name: Build OpenWrt Packages

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-zeroclaw:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Clone zeroclaw source
      run: git clone https://github.com/zeroclaw-labs/zeroclaw.git
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      
    - name: Install cross
      run: cargo install cross
    
    - name: Build zeroclaw for aarch64
      run: |
        cross build --release --target aarch64-unknown-linux-musl --manifest-path zeroclaw/Cargo.toml
    
    - name: Upload zeroclaw binary
      uses: actions/upload-artifact@v4
      with:
        name: zeroclaw-aarch64
        path: zeroclaw/target/aarch64-unknown-linux-musl/release/zeroclaw

  build-aarch64:
    runs-on: ubuntu-latest
    needs: build-zeroclaw
    steps:
    - uses: actions/checkout@v4
    
    - name: Download zeroclaw binary
      uses: actions/download-artifact@v4
      with:
        name: zeroclaw-aarch64
        path: /tmp/zeroclaw-binary
    
    - name: Verify binary exists
      run: |
        ls -la /tmp/zeroclaw-binary/
        file /tmp/zeroclaw-binary/zeroclaw
    
    - name: Copy zeroclaw binary to package
      run: |
        mkdir -p openwrt-zeroclaw/zeroclaw/files/
        cp /tmp/zeroclaw-binary/zeroclaw openwrt-zeroclaw/zeroclaw/files/
        chmod +x openwrt-zeroclaw/zeroclaw/files/zeroclaw
        ls -la openwrt-zeroclaw/zeroclaw/files/
    
    - name: Build aarch64 packages
      uses: openwrt/gh-action-sdk@v5
      env:
        ARCH: aarch64_generic-openwrt-22.03
        FEEDNAME: zeroclaw
        PACKAGES: zeroclaw luci-app-zeroclaw
    
    - name: Upload packages
      uses: actions/upload-artifact@v4
      with:
        name: zeroclaw-packages-aarch64
        path: bin/packages/*/zeroclaw/*.ipk
