name: Build OpenWrt Packages

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-zeroclaw:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Cache Rust dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          zeroclaw/target
        key: ${{ runner.os }}-rust-${{ hashFiles('zeroclaw/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-rust-
    
    - name: Clone zeroclaw source
      run: git clone https://github.com/zeroclaw-labs/zeroclaw.git
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      
    - name: Install cross
      run: cargo install cross
    
    - name: Build zeroclaw for aarch64
      run: |
        cross build --release --target aarch64-unknown-linux-musl --manifest-path zeroclaw/Cargo.toml
    
    - name: Upload zeroclaw binary
      uses: actions/upload-artifact@v4
      with:
        name: zeroclaw-aarch64
        path: zeroclaw/target/aarch64-unknown-linux-musl/release/zeroclaw

  build-aarch64:
    runs-on: ubuntu-latest
    needs: build-zeroclaw
    steps:
    - uses: actions/checkout@v4
    
    - name: Download zeroclaw binary
      uses: actions/download-artifact@v4
      with:
        name: zeroclaw-aarch64
        path: /tmp/zeroclaw-binary
    
    - name: Create zeroclaw ipk
      run: |
        set -x
        
        mkdir -p /tmp/zeroclaw-ipk/data/usr/bin
        mkdir -p /tmp/zeroclaw-ipk/data/etc/config
        mkdir -p /tmp/zeroclaw-ipk/data/etc/init.d
        mkdir -p /tmp/zeroclaw-ipk/control
        
        cp /tmp/zeroclaw-binary/zeroclaw /tmp/zeroclaw-ipk/data/usr/bin/
        chmod +x /tmp/zeroclaw-ipk/data/usr/bin/zeroclaw
        
        cp feeds/zeroclaw/files/zeroclaw.config /tmp/zeroclaw-ipk/data/etc/config/zeroclaw
        cp feeds/zeroclaw/files/zeroclaw.init /tmp/zeroclaw-ipk/data/etc/init.d/zeroclaw
        chmod +x /tmp/zeroclaw-ipk/data/etc/init.d/zeroclaw
        
        ls -la /tmp/zeroclaw-ipk/data/usr/bin/
        ls -la /tmp/zeroclaw-ipk/data/etc/config/
        ls -la /tmp/zeroclaw-ipk/data/etc/init.d/
        
        cat > /tmp/zeroclaw-ipk/control/control << 'EOF'
        Package: zeroclaw
        Version: 0.1.0-1
        Architecture: aarch64_generic
        Description: ZeroClaw proxy tool
        Section: net
        Priority: optional
        Maintainer: gcy529
        Depends: libc
        EOF
        
        echo "2.0" > /tmp/zeroclaw-ipk/debian-binary
        
        cd /tmp/zeroclaw-ipk
        tar -czvf /tmp/control.tar.gz ./control
        tar -czvf /tmp/data.tar.gz ./data
        
        cd /tmp
        tar -czvf zeroclaw_0.1.0-1_aarch64_generic.ipk ./debian-binary ./control.tar.gz ./data.tar.gz
        
        ls -la /tmp/zeroclaw_0.1.0-1_aarch64_generic.ipk
        
    - name: Create luci-app-zeroclaw ipk
      run: |
        set -x
        
        mkdir -p /tmp/luci-ipk/data/usr/lib/lua/luci/controller
        mkdir -p /tmp/luci-ipk/data/usr/lib/lua/luci/model/cbi
        mkdir -p /tmp/luci-ipk/control
        
        cp feeds/zeroclaw/luci-app-zeroclaw/luasrc/controller/zeroclaw.lua /tmp/luci-ipk/data/usr/lib/lua/luci/controller/
        cp feeds/zeroclaw/luci-app-zeroclaw/luasrc/model/cbi/zeroclaw.lua /tmp/luci-ipk/data/usr/lib/lua/luci/model/cbi/
        
        ls -la /tmp/luci-ipk/data/usr/lib/lua/luci/controller/
        ls -la /tmp/luci-ipk/data/usr/lib/lua/luci/model/cbi/
        
        cat > /tmp/luci-ipk/control/control << 'EOF'
        Package: luci-app-zeroclaw
        Version: 0.1.0-1
        Architecture: all
        Description: ZeroClaw LuCI interface
        Section: luci
        Priority: optional
        Maintainer: gcy529
        Depends: luci,zeroclaw
        EOF
        
        echo "2.0" > /tmp/luci-ipk/debian-binary
        
        cd /tmp/luci-ipk
        tar -czvf /tmp/luci-control.tar.gz ./control
        tar -czvf /tmp/luci-data.tar.gz ./data
        
        cd /tmp
        tar -czvf luci-app-zeroclaw_0.1.0-1_all.ipk ./debian-binary ./luci-control.tar.gz ./luci-data.tar.gz
        
        ls -la /tmp/luci-app-zeroclaw_0.1.0-1_all.ipk
        
    - name: Upload packages
      uses: actions/upload-artifact@v4
      with:
        name: zeroclaw-packages-aarch64
        path: |
          /tmp/zeroclaw_0.1.0-1_aarch64_generic.ipk
          /tmp/luci-app-zeroclaw_0.1.0-1_all.ipk
