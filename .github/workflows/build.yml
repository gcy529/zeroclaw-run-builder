name: Build OpenWrt Packages

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-ipk:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch:
          - x86_64
          - aarch64_generic
          - arm_cortex-a7
          - mips_24kc
          - mipsel_24kc
    steps:
    - uses: actions/checkout@v4
    
    - name: Build ZeroClaw packages
      uses: openwrt/gh-action-sdk@v5
      env:
        ARCH: ${{ matrix.arch }}-openwrt-22.03
        FEEDNAME: zeroclaw
        PACKAGES: zeroclaw luci-app-zeroclaw
        INDEX: 1
        KEY_BUILD: ${{ secrets.KEY_BUILD }}
      with:
        feeds: |
          src-link zeroclaw $GITHUB_WORKSPACE/openwrt-zeroclaw
    
    - name: Upload packages
      uses: actions/upload-artifact@v4
      with:
        name: zeroclaw-packages-${{ matrix.arch }}
        path: bin/packages/*/zeroclaw/*.ipk
        
  release:
    needs: build-ipk
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
    - uses: actions/checkout@v4
    
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
        merge-multiple: true
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: artifacts/**/*.ipk
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
